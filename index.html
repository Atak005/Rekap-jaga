<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Jaga Perawat - Atak005</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .selected-col { background-color: #d1fae5 !important; border: 2px solid #059669 !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-2">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl border border-slate-200 overflow-hidden">
        <div class="bg-blue-700 p-5 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold italic">Rekap Jaga v3</h1>
                <p class="text-xs opacity-80">Support Merged Cells & Multi-Column Search</p>
            </div>
            <button onclick="location.reload()" class="text-xs bg-blue-800 px-3 py-1 rounded">Reset</button>
        </div>

        <div class="p-4 space-y-6">
            <div id="step1">
                <label class="block text-sm font-bold text-slate-700 mb-3 border-l-4 border-blue-600 pl-2">STEP 1: UNGGAH FILE EXCEL</label>
                <input type="file" id="fileInput" accept=".xlsx, .xls" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
            </div>

            <div id="step2" class="hidden animate-pulse-once">
                <label class="block text-sm font-bold text-slate-700 mb-3 border-l-4 border-orange-500 pl-2">STEP 2: TENTUKAN BARIS HEADER & KOLOM</label>
                <p class="text-[10px] text-slate-500 mb-2 font-semibold">Klik pada nama kolom di tabel bawah untuk memilih:</p>
                
                <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
                    <button id="btnSetKode" onclick="mode='kode'" class="shrink-0 bg-blue-100 text-blue-800 border-2 border-blue-600 px-4 py-2 rounded-lg text-xs font-bold shadow-sm">🎯 Pilih Kolom KODE</button>
                    <button id="btnSetNama" onclick="mode='nama'" class="shrink-0 bg-slate-100 text-slate-800 border-2 border-slate-300 px-4 py-2 rounded-lg text-xs font-bold shadow-sm">👥 Pilih Kolom NAMA (Bisa >1)</button>
                </div>

                <div class="overflow-x-auto border rounded-lg shadow-inner bg-slate-50 max-h-64">
                    <table id="previewTable" class="w-full text-[10px] text-left border-collapse cursor-pointer">
                        </table>
                </div>
                
                <div class="mt-4 p-3 bg-blue-50 rounded-lg text-[11px] text-blue-800 border border-blue-200">
                    <strong>Konfigurasi Aktif:</strong><br>
                    Kolom Kode: <span id="infoKode" class="font-bold">-</span><br>
                    Kolom Nama: <span id="infoNama" class="font-bold">-</span>
                    <button onclick="kunciKonfigurasi()" class="mt-3 block w-full bg-blue-600 text-white font-bold py-2 rounded shadow">KUNCI & LANJUT</button>
                </div>
            </div>

            <div id="step3" class="hidden space-y-4 pt-4 border-t-2 border-dashed">
                <label class="block text-sm font-bold text-slate-700 mb-1 border-l-4 border-green-600 pl-2">STEP 3: PENCARIAN (OR)</label>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="filterKode" placeholder="Kode (613, 614, ...)" class="p-3 border-2 border-slate-200 rounded-xl outline-none focus:border-blue-500 shadow-sm">
                    <input type="text" id="filterNama" placeholder="Nama (wiwid, wiwi, ...)" class="p-3 border-2 border-slate-200 rounded-xl outline-none focus:border-blue-500 shadow-sm">
                </div>
                <button onclick="jalankanRekap()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95 text-lg">
                    CEK REKAP SEKARANG
                </button>
            </div>

            <div id="hasilSection" class="hidden space-y-3">
                <div class="flex justify-between items-end border-b-2 pb-2">
                    <h3 class="font-black text-slate-800">HASIL TEMUAN: <span id="jumlahData" class="text-blue-700 text-2xl">0</span></h3>
                </div>
                <div class="overflow-x-auto border rounded-xl shadow-md bg-white max-h-[600px]">
                    <table class="w-full text-[10px] text-left border-collapse">
                        <thead id="headTabel" class="bg-slate-800 text-white sticky top-0"></thead>
                        <tbody id="bodyTabel" class="divide-y divide-slate-200"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        let mode = 'kode'; 
        let selectedKodeCol = null;
        let selectedNamaCols = [];

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                // Kita ambil mentah (header:1) agar bisa handle baris kosong/merged
                rawData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1, defval: ""});
                showPreview();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function showPreview() {
            document.getElementById('step2').classList.remove('hidden');
            const table = document.getElementById('previewTable');
            table.innerHTML = "";
            
            // Ambil 20 baris pertama
            const previewRows = rawData.slice(0, 25); 
            
            previewRows.forEach((row, rIdx) => {
                const tr = document.createElement('tr');
                row.forEach((cell, cIdx) => {
                    const td = document.createElement(rIdx === 0 ? 'th' : 'td');
                    td.className = `p-2 border border-slate-300 min-w-[80px] ${rIdx < 5 ? 'bg-slate-200 font-bold' : ''}`;
                    td.innerText = cell;
                    td.onclick = () => selectColumn(cIdx, cell);
                    td.setAttribute('data-col', cIdx);
                    tr.appendChild(td);
                });
                table.appendChild(tr);
            });
        }

        function selectColumn(index, label) {
            if (mode === 'kode') {
                selectedKodeCol = index;
                document.getElementById('infoKode').innerText = `Kolom ke-${index + 1} (${label})`;
                highlight();
            } else {
                if (!selectedNamaCols.includes(index)) {
                    selectedNamaCols.push(index);
                } else {
                    selectedNamaCols = selectedNamaCols.filter(i => i !== index);
                }
                document.getElementById('infoNama').innerText = selectedNamaCols.map(i => i + 1).join(', ');
                highlight();
            }
        }

        function highlight() {
            // Reset highlight
            document.querySelectorAll('td, th').forEach(el => el.classList.remove('bg-blue-200', 'bg-green-200', 'border-blue-600', 'border-green-600'));
            
            // Highlight Kode
            if(selectedKodeCol !== null) {
                document.querySelectorAll(`[data-col="${selectedKodeCol}"]`).forEach(el => el.classList.add('bg-blue-100', 'border-blue-400'));
            }
            // Highlight Nama
            selectedNamaCols.forEach(cIdx => {
                document.querySelectorAll(`[data-col="${cIdx}"]`).forEach(el => el.classList.add('bg-green-100', 'border-green-400'));
            });
        }

        function kunciKonfigurasi() {
            if (selectedKodeCol === null || selectedNamaCols.length === 0) {
                alert("Pilih dulu kolom KODE dan kolom NAMA!");
                return;
            }
            document.getElementById('step3').classList.remove('hidden');
            document.getElementById('step3').scrollIntoView({behavior: 'smooth'});
        }

        function jalankanRekap() {
            const kodes = document.getElementById('filterKode').value.split(',').map(s => s.trim().toLowerCase()).filter(s => s !== "");
            const names = document.getElementById('filterNama').value.split(',').map(s => s.trim().toLowerCase()).filter(s => s !== "");

            // Kita cari di seluruh baris rawData (mulai baris ke-4 untuk menghindari header)
            const hasil = rawData.slice(3).filter(row => {
                const valKode = String(row[selectedKodeCol] || "").toLowerCase();
                const matchKode = kodes.length === 0 || kodes.some(k => valKode.includes(k));

                const matchNama = names.length === 0 || names.some(n => {
                    return selectedNamaCols.some(cIdx => String(row[cIdx] || "").toLowerCase().includes(n));
                });

                return matchKode && matchNama && valKode.trim() !== "";
            });

            tampilkanHasil(hasil);
        }

        function tampilkanHasil(data) {
            const hSec = document.getElementById('hasilSection');
            hSec.classList.remove('hidden');
            document.getElementById('jumlahData').innerText = data.length;
            
            const head = document.getElementById('headTabel');
            const body = document.getElementById('bodyTabel');
            head.innerHTML = ""; body.innerHTML = "";

            if(data.length === 0) return;

            // Buat header sederhana berdasarkan nomor kolom
            const trH = document.createElement('tr');
            rawData[2].forEach(h => { // Ambil nama kolom dari baris ke-3 mentah
                const th = document.createElement('th');
                th.className = "p-2 border font-bold uppercase";
                th.innerText = h;
                trH.appendChild(th);
            });
            head.appendChild(trH);

            data.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.className = "p-2 border whitespace-nowrap";
                    td.innerText = cell;
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
            hSec.scrollIntoView({behavior: "smooth"});
        }
    </script>
</body>
</html>
