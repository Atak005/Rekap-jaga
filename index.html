<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Jaga - Atak005</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen p-2 md:p-6">
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
        <div class="bg-emerald-600 p-5 text-white">
            <h1 class="text-xl font-bold italic">Rekap Jaga Perawat v2</h1>
            <p class="text-xs opacity-80">Flexible Column & Header Selection</p>
        </div>

        <div class="p-5 space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1 uppercase text-center border-b pb-1 mb-3">1. Impor Data Excel</label>
                <input type="file" id="fileInput" accept=".xlsx, .xls" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer"/>
            </div>

            <div id="configSection" class="hidden space-y-4 p-4 bg-slate-50 rounded-lg border">
                <div class="grid grid-cols-1 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Baris ke berapa Judul Kolom berada?</label>
                        <input type="number" id="headerRow" value="1" min="1" class="w-full p-2 border rounded text-sm" onchange="reloadColumns()">
                        <p class="text-[10px] text-slate-400">*Ganti jika judul kolom (A, S, T, U) tidak di baris pertama</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-600">Kolom Kode (A):</label>
                        <select id="selKode" class="w-full p-2 border rounded bg-white text-sm"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600">Kolom Nama (S,T,U):</label>
                        <select id="selPerawat" class="w-full p-2 border rounded bg-white text-sm" multiple size="3"></select>
                    </div>
                </div>
            </div>

            <div class="space-y-3 pt-2">
                <label class="block text-xs font-bold text-slate-500 mb-1 uppercase text-center border-b pb-1">2. Filter Pencarian</label>
                <input type="text" id="filterKode" placeholder="Input Kode (misal: 613, 614)" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none shadow-sm">
                <input type="text" id="filterNama" placeholder="Input Nama (misal: wiwid, wiwi)" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none shadow-sm">
                
                <button onclick="jalankanRekap()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg shadow-md transition-transform active:scale-95">
                    TAMPILKAN REKAP
                </button>
            </div>
        </div>

        <div id="hasilSection" class="hidden p-5 border-t bg-white">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold text-slate-700 text-sm">📊 Total: <span id="jumlahData" class="text-emerald-600 text-lg">0</span> entri</h3>
                <button onclick="window.print()" class="text-xs bg-slate-200 px-3 py-1 rounded">Cetak</button>
            </div>
            <div class="overflow-x-auto border rounded-lg shadow-inner bg-slate-50 max-h-[500px]">
                <table class="w-full text-[10px] text-left border-collapse">
                    <thead class="bg-slate-200 sticky top-0">
                        <tr id="headTabel"></tr>
                    </thead>
                    <tbody id="bodyTabel" class="divide-y divide-slate-200"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let fullWorkbook;
        let dataAktif = [];

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                fullWorkbook = XLSX.read(data, {type: 'array'});
                reloadColumns();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function reloadColumns() {
            if(!fullWorkbook) return;
            const hIdx = parseInt(document.getElementById('headerRow').value) - 1;
            const sheet = fullWorkbook.Sheets[fullWorkbook.SheetNames[0]];
            
            // Ambil data dengan range mulai dari baris header yang dipilih
            dataAktif = XLSX.utils.sheet_to_json(sheet, {range: hIdx});
            
            if(dataAktif.length > 0) {
                const cols = Object.keys(dataAktif[0]);
                const sKode = document.getElementById('selKode');
                const sPerawat = document.getElementById('selPerawat');
                sKode.innerHTML = ""; sPerawat.innerHTML = "";
                
                cols.forEach(c => {
                    sKode.add(new Option(c, c));
                    sPerawat.add(new Option(c, c));
                });
                document.getElementById('configSection').classList.remove('hidden');
            }
        }

        function jalankanRekap() {
            const kodes = document.getElementById('filterKode').value.split(',').map(s => s.trim().toLowerCase()).filter(s => s !== "");
            const names = document.getElementById('filterNama').value.split(',').map(s => s.trim().toLowerCase()).filter(s => s !== "");
            const colK = document.getElementById('selKode').value;
            const colsP = Array.from(document.getElementById('selPerawat').selectedOptions).map(o => o.value);

            const hasil = dataAktif.filter(row => {
                const valKode = String(row[colK] || "").toLowerCase();
                const matchKode = kodes.length === 0 || kodes.some(k => valKode.includes(k));

                const matchNama = names.length === 0 || names.some(n => {
                    return colsP.some(cp => String(row[cp] || "").toLowerCase().includes(n));
                });
                return matchKode && matchNama;
            });

            tampilkanTabel(hasil);
        }

        function tampilkanTabel(data) {
            const hSec = document.getElementById('hasilSection');
            const hHead = document.getElementById('headTabel');
            const hBody = document.getElementById('bodyTabel');
            hSec.classList.remove('hidden');
            document.getElementById('jumlahData').innerText = data.length;
            hHead.innerHTML = ""; hBody.innerHTML = "";
            
            if(data.length === 0) return;

            Object.keys(data[0]).forEach(key => {
                const th = document.createElement('th');
                th.className = "p-2 font-bold border-b text-slate-600 uppercase";
                th.innerText = key;
                hHead.appendChild(th);
            });

            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-emerald-50 odd:bg-white even:bg-slate-50";
                Object.values(row).forEach(val => {
                    const td = document.createElement('td');
                    td.className = "p-2 border-b";
                    td.innerText = val === undefined ? "" : val;
                    tr.appendChild(td);
                });
                hBody.appendChild(tr);
            });
            hSec.scrollIntoView({behavior: "smooth"});
        }
    </script>
</body>
</html>
