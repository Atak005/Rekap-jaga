<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Jaga Perawat - Atak005</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .selected-column { border: 2px solid #059669 !important; background-color: #ecfdf5 !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-2 md:p-6 font-sans">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-700 to-blue-500 p-6 text-white text-center">
            <h1 class="text-2xl font-extrabold tracking-tight">REKAP TINDAKAN PERAWAT</h1>
            <p class="text-blue-100 text-xs mt-1">Sistem Rekap Cepat - Khusus Magelang</p>
        </div>

        <div class="p-4 md:p-6 space-y-6">
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                <label class="block text-blue-800 text-sm font-bold mb-2">1. Unggah File Excel Anda:</label>
                <input type="file" id="fileInput" accept=".xlsx, .xls" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer"/>
            </div>

            <div id="configSection" class="hidden space-y-4 animate-fade-in">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <h2 class="text-slate-700 text-sm font-bold mb-3 border-b pb-2">2. Pengaturan Kolom (Klik untuk Memilih)</h2>
                    
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Baris Header (Biasanya baris 3):</label>
                        <input type="number" id="headerRow" value="3" min="1" class="w-20 p-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500" onchange="readColumns()">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-blue-600 mb-1 uppercase">Target Kode (Contoh: Kolom A):</label>
                            <select id="selKode" class="w-full p-2.5 border rounded-xl bg-white text-sm shadow-sm focus:border-blue-500"></select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-blue-600 mb-1 uppercase">Target Nama (Contoh: S, T, U):</label>
                            <select id="selPerawat" class="w-full p-2.5 border rounded-xl bg-white text-sm shadow-sm focus:border-blue-500" multiple size="3"></select>
                            <p class="text-[10px] text-slate-400 mt-1 italic">*Tahan tombol untuk pilih lebih dari satu (Pagi, Siang, Malam)</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl border-2 border-blue-200 shadow-sm space-y-4">
                    <h2 class="text-blue-800 text-sm font-bold text-center border-b pb-2 uppercase">3. Filter Pencarian</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <input type="text" id="filterKode" placeholder="Kode (613, 614, 620...)" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="text" id="filterNama" placeholder="Nama (wiwi, wiwid, lutfi...)" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <button onclick="jalankanRekap()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                        TAMPILKAN DATA SEKARANG
                    </button>
                </div>
            </div>
        </div>

        <div id="hasilSection" class="hidden p-4 md:p-6 bg-slate-50 border-t">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-extrabold text-slate-800">Ditemukan: <span id="jumlahData" class="text-blue-600 text-2xl">0</span></h3>
                <button onclick="window.print()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-300">CETAK PDF</button>
            </div>
            <div class="overflow-x-auto border rounded-xl shadow-inner bg-white max-h-[600px]">
                <table class="w-full text-[11px] text-left border-collapse">
                    <thead class="bg-slate-100 sticky top-0 shadow-sm">
                        <tr id="headTabel"></tr>
                    </thead>
                    <tbody id="bodyTabel" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let workbookData;
        let sheetJson = [];

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                workbookData = XLSX.read(data, {type: 'array'});
                readColumns();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function readColumns() {
            if(!workbookData) return;
            const hRow = parseInt(document.getElementById('headerRow').value) || 1;
            const sheet = workbookData.Sheets[workbookData.SheetNames[0]];
            
            // Mengambil JSON dengan range baris header (misal baris 3 maka range hRow-1)
            sheetJson = XLSX.utils.sheet_to_json(sheet, {range: hRow - 1, defval: ""});
            
            if(sheetJson.length > 0) {
                const cols = Object.keys(sheetJson[0]);
                const sK = document.getElementById('selKode');
                const sP = document.getElementById('selPerawat');
                sK.innerHTML = ""; sP.innerHTML = "";
                
                cols.forEach(c => {
                    sK.add(new Option(c, c));
                    sP.add(new Option(c, c));
                });
                
                // Set default auto (Berdasarkan screenshot Mas)
                if(cols.includes("Nama Pasien")) sK.value = cols[0]; // Kolom A biasanya pertama
                
                document.getElementById('configSection').classList.remove('hidden');
            }
        }

        function jalankanRekap() {
            const kodes = document.getElementById('filterKode').value.split(',').map(s => s.trim().toLowerCase()).filter(s => s !== "");
            const names = document.getElementById('filterNama').value.split(',').map(s => s.trim().toLowerCase()).filter(s => s !== "");
            const colTargetKode = document.getElementById('selKode').value;
            const colTargetNama = Array.from(document.getElementById('selPerawat').selectedOptions).map(o => o.value);

            const filtered = sheetJson.filter(row => {
                // Logika Kode (OR)
                const valK = String(row[colTargetKode] || "").toLowerCase();
                const matchK = kodes.length === 0 || kodes.some(k => valK.includes(k));

                // Logika Nama (OR) di semua kolom perawat terpilih
                const matchN = names.length === 0 || names.some(n => {
                    return colTargetNama.some(cn => String(row[cn] || "").toLowerCase().includes(n));
                });

                return matchK && matchN;
            });

            renderTable(filtered);
        }

        function renderTable(data) {
            const hSec = document.getElementById('hasilSection');
            const hHead = document.getElementById('headTabel');
            const hBody = document.getElementById('bodyTabel');
            
            hSec.classList.remove('hidden');
            document.getElementById('jumlahData').innerText = data.length;
            hHead.innerHTML = ""; hBody.innerHTML = "";
            
            if(data.length === 0) return;

            // Header - Hanya tampilkan kolom yang ada datanya
            Object.keys(data[0]).forEach(k => {
                const th = document.createElement('th');
                th.className = "p-3 border-b text-slate-500 font-bold uppercase tracking-wider";
                th.innerText = k;
                hHead.appendChild(th);
            });

            // Rows
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition-colors";
                Object.values(row).forEach(v => {
                    const td = document.createElement('td');
                    td.className = "p-3 border-b text-slate-700";
                    td.innerText = v;
                    tr.appendChild(td);
                });
                hBody.appendChild(tr);
            });
            hSec.scrollIntoView({behavior: "smooth"});
        }
    </script>
</body>
</html>
