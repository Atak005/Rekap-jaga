<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Rekap Jaga Perawat Lelah - by. simboke Pipo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .selected-kode { background-color: #dbeafe !important; border: 2px solid #2563eb !important; }
        .selected-nama { background-color: #d1fae5 !important; border: 2px solid #059669 !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-2 md:p-4 text-slate-800">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl border border-slate-200 overflow-hidden">
        
        <div class="bg-indigo-700 p-5 text-white shadow-md flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tight uppercase italic">Rekap Jaga v8</h1>
                <p class="text-[10px] opacity-80 font-bold uppercase">Smart Night Shift & Multi-Column Detection</p>
            </div>
            <button onclick="location.reload()" class="text-[10px] bg-indigo-800 hover:bg-indigo-900 px-3 py-1 rounded-full font-bold transition shadow-inner text-white">RESET APP</button>
        </div>

        <div class="p-4 space-y-6">
            <div id="step1" class="bg-white p-4 rounded-lg border-2 border-dashed border-slate-300">
                <label class="block text-xs font-black text-slate-500 mb-3 uppercase tracking-widest">1. Unggah File Excel</label>
                <input type="file" id="fileInput" accept=".xlsx, .xls" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer"/>
            </div>

            <div id="step2" class="hidden space-y-4">
                <div class="flex items-center gap-2 border-l-4 border-orange-500 pl-3">
                    <h2 class="text-sm font-black text-slate-700 uppercase tracking-tighter">2. Tentukan Kolom (Klik pada Tabel)</h2>
                </div>
                <div class="flex gap-2 overflow-x-auto pb-2">
                    <button id="btnSetKode" onclick="setMode('kode')" class="shrink-0 bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-black shadow hover:bg-blue-700 transition">🎯 KOLOM KODE</button>
                    <button id="btnSetNama" onclick="setMode('nama')" class="shrink-0 bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-[10px] font-black shadow hover:bg-slate-300 transition uppercase">👥 SEMUA KOLOM NAMA (Termasuk yg Geser)</button>
                </div>
                <div class="overflow-x-auto border rounded-lg bg-slate-50 max-h-72 shadow-inner border-slate-200">
                    <table id="previewTable" class="w-full text-[10px] text-left border-collapse cursor-pointer"></table>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 p-3 bg-slate-50 rounded-lg border border-slate-200 text-[11px] font-medium">
                    <div class="flex items-center gap-2 text-blue-700 font-bold">📌 KODE: <span id="infoKode" class="bg-blue-100 px-2 rounded">-</span></div>
                    <div class="flex items-center gap-2 text-emerald-700 font-bold">📌 NAMA: <span id="infoNama" class="bg-emerald-100 px-2 rounded">-</span></div>
                    <button onclick="kunciKolom()" class="md:col-span-2 w-full bg-indigo-600 text-white font-black py-3 rounded-xl shadow-lg mt-2 text-xs hover:bg-indigo-700 active:scale-95 transition tracking-widest">KUNCI KONFIGURASI</button>
                </div>
            </div>

            <div id="step3" class="hidden space-y-4 pt-4 border-t-2 border-dashed border-slate-200">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Kode Tindakan</label>
                        <input type="text" id="filterKode" placeholder="Contoh: 613, 620" class="w-full p-3 border-2 border-slate-200 rounded-xl outline-none focus:border-indigo-500 shadow-sm text-sm font-bold uppercase">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Nama Perawat (Exact)</label>
                        <input type="text" id="filterNama" placeholder="Contoh: Wiwi, Mila" class="w-full p-3 border-2 border-slate-200 rounded-xl outline-none focus:border-indigo-500 shadow-sm text-sm font-bold uppercase">
                    </div>
                </div>
                <button onclick="jalankanProses()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-xl transition active:scale-95 text-lg tracking-[0.2em]">PROSES REKAP</button>
            </div>

            <div id="hasilSection" class="hidden space-y-4">
                <div id="summaryArea"></div>
                <div class="flex justify-between items-end border-b-2 border-slate-100 pb-2">
                    <h3 class="font-black text-slate-800 text-sm uppercase">Detail Temuan: <span id="jumlahData" class="text-indigo-600 text-2xl">0</span></h3>
                    <button onclick="window.print()" class="text-[10px] font-bold text-indigo-600 border border-indigo-200 px-3 py-1 rounded hover:bg-indigo-50 transition">CETAK / PDF</button>
                </div>
                <div class="overflow-x-auto border rounded-xl shadow-md bg-white max-h-[600px]">
                    <table class="w-full text-[10px] text-left border-collapse">
                        <thead id="headTabel" class="bg-slate-800 text-white sticky top-0"></thead>
                        <tbody id="bodyTabel" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        let curMode = 'kode'; 
        let idxKode = null;
        let idxNama = [];

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                rawData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1, defval: ""});
                showWizard();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function showWizard() {
            document.getElementById('step2').classList.remove('hidden');
            const table = document.getElementById('previewTable');
            table.innerHTML = "";
            rawData.slice(0, 35).forEach((row, rIdx) => {
                const tr = document.createElement('tr');
                row.forEach((cell, cIdx) => {
                    const td = document.createElement(rIdx < 3 ? 'th' : 'td');
                    td.className = `p-2 border border-slate-200 min-w-[100px] whitespace-nowrap ${rIdx < 3 ? 'bg-slate-100 font-black text-slate-600' : ''}`;
                    td.innerText = cell;
                    td.onclick = () => handleSelect(cIdx, cell);
                    td.setAttribute('data-col', cIdx);
                    tr.appendChild(td);
                });
                table.appendChild(tr);
            });
            document.getElementById('step2').scrollIntoView({behavior: 'smooth'});
        }

        function setMode(m) {
            curMode = m;
            document.getElementById('btnSetKode').className = m === 'kode' ? 'shrink-0 bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-black shadow' : 'shrink-0 bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-[10px] font-black shadow';
            document.getElementById('btnSetNama').className = m === 'nama' ? 'shrink-0 bg-emerald-600 text-white px-4 py-2 rounded-lg text-[10px] font-black shadow' : 'shrink-0 bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-[10px] font-black shadow';
        }

        function handleSelect(cIdx, label) {
            if (curMode === 'kode') { idxKode = cIdx; document.getElementById('infoKode').innerText = `Kol ${cIdx+1}`; }
            else { if (!idxNama.includes(cIdx)) idxNama.push(cIdx); else idxNama = idxNama.filter(i => i !== cIdx); document.getElementById('infoNama').innerText = idxNama.map(i => i + 1).sort((a,b)=>a-b).join(', '); }
            updateHighlight();
        }

        function updateHighlight() {
            document.querySelectorAll('td, th').forEach(el => el.classList.remove('selected-kode', 'selected-nama'));
            if(idxKode !== null) document.querySelectorAll(`[data-col="${idxKode}"]`).forEach(el => el.classList.add('selected-kode'));
            idxNama.forEach(i => document.querySelectorAll(`[data-col="${i}"]`).forEach(el => el.classList.add('selected-nama')));
        }

        function kunciKolom() {
            if (idxKode === null || idxNama.length === 0) return alert("Pilih kolom target dulu, Mas!");
            document.getElementById('step3').classList.remove('hidden');
        }

        function jalankanProses() {
            const valK = document.getElementById('filterKode').value.toLowerCase().split(',').map(s => s.trim()).filter(s => s !== "");
            const valN = document.getElementById('filterNama').value.toLowerCase().split(',').map(s => s.trim()).filter(s => s !== "");

            const hasil = rawData.slice(3).filter(row => {
                const rowK = String(row[idxKode] || "").trim().toLowerCase();
                if (rowK === "") return false;
                const matchK = valK.length === 0 || valK.some(k => rowK.includes(k));
                const matchN = valN.length === 0 || valN.some(n => {
                    return idxNama.some(i => String(row[i] || "").toLowerCase().trim() === n);
                });
                return matchK && matchN;
            });
            tampilkanHasil(hasil, valN);
        }

        function tampilkanHasil(data, filterNamanya) {
            const hSec = document.getElementById('hasilSection');
            const head = document.getElementById('headTabel');
            const body = document.getElementById('bodyTabel');
            const sumArea = document.getElementById('summaryArea');
            hSec.classList.remove('hidden');
            document.getElementById('jumlahData').innerText = data.length;
            head.innerHTML = ""; body.innerHTML = ""; sumArea.innerHTML = "";

            const countKode = {};
            let totalMalam = 0;

            data.forEach(row => {
                const k = String(row[idxKode]).trim();
                countKode[k] = (countKode[k] || 0) + 1;

                // DETEKSI MALAM DI SEMUA KOLOM YANG DIPILIH
                idxNama.forEach(i => {
                    const headerTxt = String(rawData[2][i] || "").toLowerCase();
                    const cellVal = String(row[i] || "").toLowerCase().trim();
                    if (headerTxt.includes("malam") && (filterNamanya.length === 0 || filterNamanya.includes(cellVal))) {
                        totalMalam++;
                    }
                });
            });

            const sumDiv = document.createElement('div');
            sumDiv.className = "space-y-2 p-3 bg-indigo-50 border border-indigo-100 rounded-xl mb-4 shadow-sm";
            let htmlKodes = '<div class="flex flex-wrap gap-2"><span class="w-full text-[10px] font-black text-indigo-800 uppercase">Rekap Per Kode:</span>';
            Object.keys(countKode).sort().forEach(k => { htmlKodes += `<div class="bg-white px-2 py-1 rounded border border-indigo-200 text-[10px]"><b>${k}</b>: ${countKode[k]}</div>`; });
            htmlKodes += '</div>';
            let htmlMalam = `<div class="pt-2 border-t border-indigo-200 flex items-center gap-2 font-black uppercase text-[10px] text-indigo-900">
                <span>TOTAL JAGA MALAM:</span>
                <div class="bg-slate-800 text-white px-4 py-1 rounded-full shadow-md text-xs">🌙 ${totalMalam} KALI</div>
            </div>`;
            sumDiv.innerHTML = htmlKodes + htmlMalam;
            sumArea.appendChild(sumDiv);

            if (data.length === 0) return;

            const trH = document.createElement('tr');
            const mainCols = ["KODE", (rawData[1][idxKode+1] || "PASIEN"), (rawData[1][idxKode+4] || "NO.CM")];
            mainCols.forEach((txt, i) => {
                const th = document.createElement('th');
                th.className = `p-3 border font-black ${i===0?'bg-slate-900':'bg-slate-700'} text-white sticky top-0 uppercase`;
                th.innerText = txt;
                trH.appendChild(th);
            });

            idxNama.sort((a,b)=>a-b).forEach(i => {
                const th = document.createElement('th');
                const isMalam = String(rawData[2][i]||"").toLowerCase().includes("malam");
                th.className = `p-3 border font-black ${isMalam?'bg-indigo-900':'bg-emerald-800'} text-white sticky top-0 uppercase`;
                th.innerText = (rawData[2][i] || `KOLOM ${i+1}`);
                trH.appendChild(th);
            });
            head.appendChild(trH);

            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-indigo-50 odd:bg-white even:bg-slate-50/50 transition-colors";
                
                const tdK = document.createElement('td'); tdK.className = "p-3 border font-black text-indigo-700 bg-indigo-50/30"; tdK.innerText = row[idxKode]; tr.appendChild(tdK);
                const tdP = document.createElement('td'); tdP.className = "p-3 border text-slate-700 font-medium"; tdP.innerText = row[idxKode+1] || "-"; tr.appendChild(tdP);
                const tdC = document.createElement('td'); tdC.className = "p-3 border text-slate-600 font-mono text-[9px]"; tdC.innerText = row[idxKode+4] || "-"; tr.appendChild(tdC);

                idxNama.sort((a,b)=>a-b).forEach(i => {
                    const td = document.createElement('td');
                    const isMalam = String(rawData[2][i]||"").toLowerCase().includes("malam");
                    td.className = `p-3 border font-bold ${isMalam?'text-indigo-900 bg-indigo-50/40':'text-slate-700'}`;
                    td.innerText = row[i] || "-";
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
            hSec.scrollIntoView({behavior: 'smooth'});
        }
    </script>
</body>
</html>
